function pmBuildForm(p) {
  const allClients = [...new Set([...PM_CLIENTS, ...PM_PROJECTS.map(x => x.client)])];
  const clientOpts = allClients.map(c => `<option value="${escHtml(c)}"${p&&p.client===c?' selected':''}>${escHtml(c)}</option>`).join('');
  const nameOpts = PM_PROJECTS.map(x => `<option value="${x.id}"${p&&p.id===x.id?' selected':''}>${escHtml(x.name)}</option>`).join('');
  const stOpts = [['active','進行中'],['waiting','待ち'],['done','完了'],['pending','検討中']].map(([v,l]) => `<option value="${v}"${p&&p.status===v?' selected':''}>${l}</option>`).join('');
  const prOpts = [['high','高'],['mid','中'],['low','低']].map(([v,l]) => `<option value="${v}"${p&&p.priority===v?' selected':''}>${l}</option>`).join('');
  const mChecks = MEMBERS.map(m => `<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;color:var(--text2);"><input type="checkbox" name="pm-members" value="${m.key}"${p&&p.members.includes(m.key)?' checked':''}><span style="color:${m.color}">${m.name}</span></label>`).join('');
  const links = (p && p.gcalLinks) || [];
  const linkRows = links.map((l, i) => `
    <div class="pm-gcal-row" style="display:flex;gap:6px;align-items:center;margin-bottom:4px;">
      <input class="pm-gcal-title" placeholder="ラベル" value="${escHtml(l.title||'')}" style="flex:1;font-size:11px;padding:5px 8px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;">
      <input class="pm-gcal-url" placeholder="GoogleカレンダーURL" value="${escHtml(l.url||'')}" style="flex:2;font-size:11px;padding:5px 8px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;">
      <button class="pm-del-link" style="padding:4px 8px;font-size:11px;border:0.5px solid var(--border);border-radius:6px;background:transparent;color:#f87171;cursor:pointer;">✕</button>
    </div>`).join('');
  const inlineStyle = 'width:100%;font-size:12px;padding:6px 10px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;';
  return `
    <div style="font-size:14px;font-weight:500;margin-bottom:16px;">${p?'案件を編集':'新規案件を追加'}</div>
    <div style="margin-bottom:12px;"><label style="font-size:11px;color:var(--text2);margin-bottom:4px;display:block;">クライアント</label>
      <select id="pm-fm-client" style="${inlineStyle}"><option value="">── 選択してください ──</option>${clientOpts}<option value="__new__">＋ 新しいクライアントを入力</option></select>
      <input id="pm-fm-client-new" placeholder="新しいクライアント名" style="${inlineStyle}margin-top:6px;display:none;">
    </div>
    <div style="margin-bottom:12px;"><label style="font-size:11px;color:var(--text2);margin-bottom:4px;display:block;">案件名</label>
      <select id="pm-fm-name-sel" style="${inlineStyle}"><option value="__new__">＋ 新しい案件名を入力</option>${nameOpts}</select>
      <input id="pm-fm-name" placeholder="案件名を入力" value="${p?escHtml(p.name):''}" style="${inlineStyle}margin-top:6px;">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
      <div><label style="font-size:11px;color:var(--text2);margin-bottom:4px;display:block;">ステータス</label><select id="pm-fm-status" style="${inlineStyle}">${stOpts}</select></div>
      <div><label style="font-size:11px;color:var(--text2);margin-bottom:4px;display:block;">優先度</label><select id="pm-fm-prio" style="${inlineStyle}">${prOpts}</select></div>
    </div>
    <div style="margin-bottom:12px;"><label style="font-size:11px;color:var(--text2);margin-bottom:4px;display:block;">期限</label><input type="date" id="pm-fm-deadline" value="${p?p.deadline:'2026-04-30'}" style="${inlineStyle}"></div>
    <div style="margin-bottom:12px;"><label style="font-size:11px;color:var(--text2);margin-bottom:4px;display:block;">担当メンバー</label><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;">${mChecks}</div></div>
    <div style="margin-bottom:12px;"><label style="font-size:11px;color:var(--text2);margin-bottom:4px;display:block;">Googleカレンダーリンク</label>
      <div id="pm-gcal-wrap">${linkRows}</div>
      <button id="pm-add-link" style="font-size:11px;color:#8b83ff;cursor:pointer;padding:4px 0;border:none;background:none;font-family:inherit;">＋ リンクを追加</button>
    </div>`;
}
function pmGetFormVals() {
  const cSel = document.getElementById('pm-fm-client').value;
  const cNew = document.getElementById('pm-fm-client-new').value.trim();
  const client = cSel === '__new__' ? cNew : (cSel || cNew);
  const nSel = document.getElementById('pm-fm-name-sel').value;
  const nInp = document.getElementById('pm-fm-name').value.trim();
  const name = nSel === '__new__' ? nInp : (nInp || PM_PROJECTS.find(p => p.id === nSel)?.name || nInp);
  const members = [...document.querySelectorAll('input[name="pm-members"]:checked')].map(el => el.value);
  const links = [...document.querySelectorAll('.pm-gcal-row')].map(row => ({
    title: row.querySelector('.pm-gcal-title').value.trim(),
    url: row.querySelector('.pm-gcal-url').value.trim(),
  })).filter(l => l.title || l.url);
  return {
    name: name || '無題', client: client || '未設定',
    status: document.getElementById('pm-fm-status').value,
    priority: document.getElementById('pm-fm-prio').value,
    deadline: document.getElementById('pm-fm-deadline').value,
    members: members.length ? members : ['nabe'],
    gcalLinks: links,
  };
}
function pmOpenModal(html, onSave) {
  const bg = document.createElement('div');
  bg.id = 'pm-modal-bg';
  bg.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;';
  const box = document.createElement('div');
  box.style.cssText = 'background:var(--bg2);border-radius:12px;border:0.5px solid var(--border2);padding:20px;width:460px;max-height:90vh;overflow-y:auto;';
  box.innerHTML = html + `<div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
    <button id="pm-modal-cancel" style="padding:6px 18px;font-size:12px;border-radius:6px;cursor:pointer;font-family:inherit;border:0.5px solid var(--border2);background:transparent;color:var(--text2);">キャンセル</button>
    <button id="pm-modal-save" style="padding:6px 18px;font-size:12px;border-radius:6px;cursor:pointer;font-family:inherit;border:none;background:#6c63ff;color:#fff;">保存</button>
  </div>`;
  bg.appendChild(box);
  document.body.appendChild(bg);
  document.getElementById('pm-modal-cancel').addEventListener('click', () => bg.remove());
  document.getElementById('pm-modal-save').addEventListener('click', () => { onSave(); bg.remove(); });
  bg.addEventListener('click', e => { if (e.target === bg) bg.remove(); });
  // バインド
  setTimeout(() => {
    const cSel = document.getElementById('pm-fm-client');
    const cNew = document.getElementById('pm-fm-client-new');
    if (cSel && cNew) {
      cSel.addEventListener('change', () => {
        if (cSel.value === '__new__') { cNew.style.display = ''; cNew.focus(); } else cNew.style.display = 'none';
      });
    }
    const nSel = document.getElementById('pm-fm-name-sel');
    const nInp = document.getElementById('pm-fm-name');
    if (nSel && nInp) {
      nSel.addEventListener('change', () => {
        if (nSel.value === '__new__') { nInp.value = ''; nInp.focus(); }
        else { const p = PM_PROJECTS.find(x => x.id === nSel.value); if (p) nInp.value = p.name; }
      });
    }
    const addLinkBtn = document.getElementById('pm-add-link');
    const wrap = document.getElementById('pm-gcal-wrap');
    if (addLinkBtn && wrap) {
      addLinkBtn.addEventListener('click', () => {
        const row = document.createElement('div');
        row.className = 'pm-gcal-row';
        row.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:4px;';
        row.innerHTML = `<input class="pm-gcal-title" placeholder="ラベル" style="flex:1;font-size:11px;padding:5px 8px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;"><input class="pm-gcal-url" placeholder="GoogleカレンダーURL" style="flex:2;font-size:11px;padding:5px 8px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;"><button class="pm-del-link" style="padding:4px 8px;font-size:11px;border:0.5px solid var(--border);border-radius:6px;background:transparent;color:#f87171;cursor:pointer;">✕</button>`;
        wrap.appendChild(row);
        pmBindDelLinks();
      });
    }
    pmBindDelLinks();
  }, 30);
}
function pmBindDelLinks() {
  document.querySelectorAll('.pm-del-link').forEach(btn => {
    btn.replaceWith(btn.cloneNode(true));
  });
  document.querySelectorAll('.pm-del-link').forEach(btn => {
    btn.addEventListener('click', () => btn.closest('.pm-gcal-row').remove());
  });
}
function pmOpenAddModal() {

  });
}
function pmOpenEditModal(id) {
  const p = PM_PROJECTS.find(x => x.id === id);
  if (!p) return;
  pmOpenModal(pmBuildForm(p), () => {
    const v = pmGetFormVals();
    Object.assign(p, v);
    pmRender();
    if (pmSelId === id) pmShowDetail(p);
  });
}

// フィルターイベント
document.getElementById('pm-search').addEventListener('input', () => pmRenderTable());
document.getElementById('pm-filter-status').addEventListener('change', () => pmRenderTable());
document.getElementById('pm-filter-member').addEventListener('change', () => pmRenderTable());
