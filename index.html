<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&S Design チームカレンダー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --bg2: #16161d;
  --bg3: #1e1e28;
  --bg4: #26263a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e8f0;
  --text2: #9090a8;
  --text3: #5a5a72;
  --accent: #6c63ff;
  --accent2: #a89dff;
  --success: #3ecf8e;
  --danger: #f87171;
  --warning: #fbbf24;

  --nabe:   #9fe1e7; --nabe-bg:   rgba(159,225,231,0.20); --nabe-text:   #9fe1e7;
  --imai:   #7bd148; --imai-bg:   rgba(123,209,72,0.20);  --imai-text:   #9fe05a;
  --moriya: #fa573c; --moriya-bg: rgba(250,87,60,0.20);   --moriya-text: #ff7a62;
  --kondo:  #ff7537; --kondo-bg:  rgba(255,117,55,0.20);  --kondo-text:  #ff9560;
  --maru:   #d06b64; --maru-bg:   rgba(208,107,100,0.20); --maru-text:   #e08880;
  --hashi:  #c2c2c2; --hashi-bg:  rgba(194,194,194,0.18); --hashi-text:  #d8d8d8;
  --ina:    #46b8c8; --ina-bg:    rgba(70,184,200,0.20);  --ina-text:    #6dd0de;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0;
  height: 56px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 220px;
  flex-shrink: 0;
  padding: 0 16px 0 20px;
  border-right: 1px solid var(--border);
  height: 100%;
}

.logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}

.logo-text { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.logo-sub  { font-size: 11px; color: var(--text3); margin-top: 1px; }

.header-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  padding: 0 16px;
}

.header-tabs {
  display: flex;
  align-items: center;
  padding-right: 20px;
  flex-shrink: 0;
}

.nav-btn {
  height: 32px;
  padding: 0 14px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.nav-btn:hover { background: var(--bg3); color: var(--text); }
.nav-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 500;
}
.nav-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }

/* ── Layout ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 56px);
}

/* ── Sidebar ── */
.sidebar {
  width: 220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}

.sidebar-section { padding: 18px 16px 8px; }
.sidebar-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  font-weight: 600;
}

.mini-cal { width: 100%; }
.mini-cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.mini-cal-title { font-size: 12px; font-weight: 600; }
.mini-nav-btn {
  width: 22px; height: 22px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-size: 10px;
  display: flex; align-items: center; justify-content: center;
}
.mini-nav-btn:hover { background: var(--bg3); }

.mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.mini-day-head { font-size: 9px; color: var(--text3); text-align: center; padding: 2px 0; }
.mini-day {
  font-size: 10px;
  text-align: center;
  padding: 3px 0;
  border-radius: 4px;
  cursor: pointer;
  color: var(--text2);
  transition: all 0.1s;
}
.mini-day:hover { background: var(--bg4); color: var(--text); }
.mini-day.other { color: var(--text3); }
.mini-day.today { background: var(--accent); color: #fff; font-weight: 600; }
.mini-day.has-events::after {
  content: '';
  display: block;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent2);
  margin: 1px auto 0;
}

.member-list { display: flex; flex-direction: column; gap: 4px; }
.member-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.member-item:hover { background: var(--bg3); }
.member-item.off { opacity: 0.35; }
.member-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.member-name { font-size: 12px; font-weight: 500; flex: 1; }
.member-email { font-size: 10px; color: var(--text3); }

.sidebar-footer {
  margin-top: auto;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.sync-info { font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.cal-header {
  padding: 16px 24px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.cal-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }

.cal-controls { display: flex; align-items: center; gap: 8px; }
.ctrl-btn {
  width: 32px; height: 32px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.ctrl-btn:hover { background: var(--bg3); color: var(--text); }

.today-btn {
  height: 32px; padding: 0 14px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 12px; font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}
.today-btn:hover { background: var(--bg3); color: var(--text); }

/* ── Calendar Grid ── */
.cal-grid-wrap { flex: 1; overflow-y: auto; padding: 0; }

.day-heads {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.day-head {
  padding: 8px 0;
  font-size: 12px;
  color: var(--text2);
  text-align: center;
  font-weight: 500;
}
.day-head:first-child { color: #f87171; }
.day-head:last-child  { color: #60a5fa; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0;
  border-left: 1px solid var(--border);
  border-top: 1px solid var(--border);
}

.cal-cell {
  min-height: 140px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 6px;
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.cal-cell:hover { background: rgba(108,99,255,0.04); }
.cal-cell.other-month { background: rgba(0,0,0,0.15); }
.cal-cell.other-month .cell-day { color: var(--text3); }
.cal-cell.today { background: rgba(108,99,255,0.08); }
.cal-cell.today .cell-day {
  background: var(--accent);
  color: #fff;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

.cell-day-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.cell-day { font-size: 12px; font-weight: 500; color: var(--text2); }
.cell-add-btn {
  width: 18px; height: 18px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text3);
  font-size: 12px;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  transition: all 0.1s;
  line-height: 1;
}
.cal-cell:hover .cell-add-btn { display: flex; }
.cell-add-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

.ev-chip {
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 4px;
  margin-bottom: 2px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  display: block;
  line-height: 1.5;
  transition: opacity 0.1s;
}
.ev-chip:hover { opacity: 0.85; }
.ev-more {
  font-size: 9px;
  color: var(--text3);
  padding: 1px 4px;
}

/* ── Right Panel ── */
.right-panel {
  width: 0;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.25s ease;
  flex-shrink: 0;
}
.right-panel.open { width: 320px; }

.panel-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.panel-title { font-size: 13px; font-weight: 600; }
.panel-close {
  width: 24px; height: 24px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
}
.panel-close:hover { background: var(--bg3); color: var(--text); }

.panel-body { padding: 14px 18px; overflow-y: auto; flex: 1; }

.detail-ev-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.detail-ev-item:last-child { border-bottom: none; }
.detail-ev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.detail-ev-name { font-size: 11px; font-weight: 600; min-width: 36px; }
.detail-ev-title { font-size: 12px; font-weight: 500; }
.detail-ev-time { font-size: 11px; color: var(--text3); margin-top: 1px; }

.form-group { margin-bottom: 12px; }
.form-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; display: block; font-weight: 500; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 7px 10px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.form-select { cursor: pointer; }
.form-textarea { min-height: 60px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.form-submit {
  width: 100%;
  padding: 9px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 4px;
}
.form-submit:hover { background: var(--accent2); }

.status-badge {
  padding: 7px 10px;
  border-radius: 7px;
  font-size: 11px;
  margin-top: 8px;
}
.status-badge.success { background: rgba(62,207,142,0.12); color: var(--success); }
.status-badge.error   { background: rgba(248,113,113,0.12); color: var(--danger); }
.status-badge.info    { background: rgba(108,99,255,0.12);  color: var(--accent2); }

.empty-day { font-size: 12px; color: var(--text3); padding: 12px 0; text-align: center; }

.add-day-btn {
  width: 100%;
  padding: 7px;
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: 7px;
  color: var(--text3);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.15s;
}
.add-day-btn:hover { border-color: var(--accent); color: var(--accent2); background: rgba(108,99,255,0.05); }

/* ── Categories Accordion ── */
.acc-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 7px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.acc-header:hover { background: var(--bg3); }
.acc-header.active { background: var(--bg3); outline: 1px solid var(--border2); }
.acc-header.off { opacity: 0.35; }
.acc-icon {
  width: 22px; height: 22px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
.acc-name { font-size: 12px; font-weight: 500; flex: 1; }
.acc-count {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 99px;
  background: var(--bg4);
  color: var(--text3);
  min-width: 20px;
  text-align: center;
}
.acc-chevron {
  font-size: 9px;
  color: var(--text3);
  transition: transform 0.2s;
  margin-left: 2px;
  line-height: 1;
}
.acc-chevron.open { transform: rotate(90deg); }

.acc-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.25s ease;
}
.acc-body.open { max-height: 600px; }

.acc-ev-list {
  padding: 4px 4px 6px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.acc-ev-item {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 4px 6px;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.1s;
}
.acc-ev-item:hover { background: var(--bg4); }
.acc-ev-item.gantt-item-active {
  background: rgba(108,99,255,0.12);
  outline: 1px solid var(--accent);
  border-radius: 6px;
}
.acc-ev-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
}
.acc-ev-info { flex: 1; min-width: 0; }
.acc-ev-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.acc-ev-meta {
  font-size: 10px;
  color: var(--text3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.acc-ev-empty {
  font-size: 11px;
  color: var(--text3);
  padding: 6px 6px 4px;
  text-align: center;
}
.acc-all-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text2);
  transition: background 0.15s;
  margin-bottom: 2px;
}
.acc-all-row:hover { background: var(--bg3); color: var(--text); }
.acc-all-row.active { background: var(--bg3); color: var(--text); font-weight: 500; }

.ev-chip.is-task {
  border-left: 2px solid #06b6d4;
  border-style: dashed;
  opacity: 0.9;
}
.task-check {
  display: inline-block;
  width: 10px; height: 10px;
  border: 1.5px solid #06b6d4;
  border-radius: 2px;
  margin-right: 3px;
  vertical-align: middle;
  flex-shrink: 0;
}
/* ── Context Menu ── */
.ctx-menu {
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 6px;
  min-width: 180px;
  z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: none;
  animation: ctxFadeIn 0.12s ease;
}
.ctx-menu.show { display: block; }
@keyframes ctxFadeIn {
  from { opacity: 0; transform: scale(0.96) translateY(-4px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.ctx-date-label {
  font-size: 11px;
  color: var(--text3);
  padding: 4px 10px 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
  font-weight: 500;
}
.ctx-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
  transition: background 0.1s;
}
.ctx-item:hover { background: var(--bg4); }
.ctx-item-icon {
  width: 20px; height: 20px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}
.ctx-sep {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}
/* ── Zoom Controls ── */
.zoom-ctrl {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--bg3);
  border-radius: 8px;
  padding: 3px;
  margin-left: 4px;
}
.zoom-btn {
  width: 26px; height: 26px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
  line-height: 1;
}
.zoom-btn:hover { background: var(--bg2); color: var(--text); }
.zoom-btn:active { transform: scale(0.92); }
.zoom-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  min-width: 36px;
  text-align: center;
}

/* ── View Tabs ── */
.view-tabs {
  display: flex;
  background: var(--bg3);
  border-radius: 10px;
  padding: 4px;
  gap: 3px;
}
.view-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
  white-space: nowrap;
}
.view-tab svg { flex-shrink: 0; opacity: 0.7; transition: opacity 0.15s; }
.view-tab:hover { color: var(--text); }
.view-tab:hover svg { opacity: 1; }
.view-tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.35); }
.view-tab.active svg { opacity: 1; }

/* ── Gantt ── */
.gantt-wrap { min-width: 900px; }
.gantt-header {
  display: flex;
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.gantt-label-col {
  width: 200px;
  flex-shrink: 0;
  padding: 8px 16px;
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  letter-spacing: 0.05em;
  border-right: 1px solid var(--border);
}
.gantt-timeline-header { flex: 1; display: flex; overflow: hidden; }
.gantt-month-block {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}
.gantt-month-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  padding: 4px 8px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.gantt-days-row { display: flex; }
.gantt-day-cell {
  flex-shrink: 0;
  text-align: center;
  font-size: 9px;
  color: var(--text3);
  padding: 3px 0;
  border-right: 0.5px solid var(--border);
  overflow: hidden;
}
.gantt-day-cell.today { color: var(--accent); font-weight: 700; background: rgba(108,99,255,0.08); }
.gantt-day-cell.weekend { background: rgba(255,255,255,0.02); }

.gantt-row {
  display: flex;
  border-bottom: 1px solid var(--border);
  min-height: 36px;
  align-items: center;
}
.gantt-row:hover { background: rgba(255,255,255,0.02); }
.gantt-row.member-header {
  background: var(--bg3);
  min-height: 28px;
}
.gantt-name {
  width: 200px;
  flex-shrink: 0;
  padding: 4px 16px;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}
.gantt-name-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.gantt-name-text { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-name-sub { font-size: 10px; color: var(--text3); white-space: nowrap; }
.gantt-bars { flex: 1; position: relative; height: 36px; }
.gantt-bar {
  position: absolute;
  height: 18px;
  top: 9px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  padding: 0 6px;
  font-size: 9px;
  font-weight: 500;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  cursor: pointer;
  transition: opacity 0.15s;
  min-width: 4px;
}
.gantt-bar:hover { opacity: 0.8; }
.gantt-today-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1.5px;
  background: var(--accent);
  z-index: 5;
  pointer-events: auto;
  transition: width 0.1s, opacity 0.1s;
}
.gantt-today-line:hover {
  width: 3px;
  opacity: 0.8;
}
.gantt-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
.gantt-range-label { font-size: 12px; color: var(--text2); font-weight: 500; }
.gantt-filter-btn {
  padding: 3px 10px;
  font-size: 11px;
  border-radius: 99px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.gantt-filter-btn:hover,.gantt-filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
/* ── Notification Toast ── */
.notif-toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  min-width: 280px;
  max-width: 360px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  z-index: 99999;
  animation: toastIn 0.3s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
@keyframes toastIn {
  from { opacity:0; transform:translateY(20px) scale(0.95); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.notif-toast.out { animation: toastOut 0.25s ease forwards; }
@keyframes toastOut {
  to { opacity:0; transform:translateY(12px) scale(0.95); }
}
.notif-bell {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: rgba(108,99,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.notif-body { flex: 1; min-width: 0; }
.notif-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.notif-sub { font-size: 11px; color: var(--text2); }
.notif-close {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: none;
  background: var(--bg4);
  color: var(--text3);
  cursor: pointer;
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.notif-close:hover { background: var(--bg3); color: var(--text); }
.notif-perm-banner {
  position: fixed;
  top: 64px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg2);
  border: 1px solid var(--accent);
  border-radius: 10px;

  align-items: center;

  color: var(--text);
  z-index: 99999;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  animation: toastIn 0.3s ease;
}
/* ── scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 10px; }
</style>

  const t = title;

const today = new Date();
let cur = new Date(today.getFullYear(), today.getMonth(), 1);
let activeMembers = new Set(MEMBERS.map(m => m.key));
let activeCategories = new Set(CATEGORIES.map(c => c.key)); // 全カテゴリーON
let soloCategory = null; // クリックで1カテゴリーのみ表示
let selectedDate = null;
let panelMode = null;
let soloMember = null;

// ─── Init Categories (Accordion) ───
function initCategories() {
  const list = document.getElementById('cat-list');
  list.innerHTML = '';

  // すべて表示ボタン
  const allRow = document.createElement('div');
  allRow.className = 'acc-all-row active';
  allRow.id = 'cat-all';
  allRow.innerHTML = `<span style="font-size:13px;width:22px;text-align:center;">☰</span><span style="flex:1">すべて表示</span>`;
  allRow.onclick = () => exitSoloCategory();
  list.appendChild(allRow);

  // カテゴリーごとのアコーディオン
  CATEGORIES.forEach(c => {
    const wrap = document.createElement('div');
    wrap.style.marginBottom = '2px';

    // ヘッダー
    const header = document.createElement('div');
    header.className = 'acc-header';
    header.id = 'cat-' + c.key;
    const count = EVENTS.filter(e => e.cat === c.key).length;
    header.innerHTML = `
      <div class="acc-icon" style="background:${c.bg}">${c.icon}</div>
      <div class="acc-name">${c.name}</div>
      <div class="acc-count" id="cat-count-${c.key}">${count}</div>
      <div class="acc-chevron" id="cat-chevron-${c.key}">▶</div>`;

    // ボディ（予定リスト）
    const body = document.createElement('div');
    body.className = 'acc-body';
    body.id = 'cat-body-' + c.key;

    // ヘッダークリック：アコーディオン開閉 + カテゴリーフィルター
    header.onclick = (e) => {
      const isOpen = body.classList.contains('open');
      if (!isOpen) {
        // 開く → このカテゴリーのみ表示 & アコーディオンOPEN
        toggleSoloCategory(c.key);
        openAccordion(c.key);
      } else {
        // 閉じる → フィルター解除 & アコーディオンCLOSE
        exitSoloCategory();
        closeAccordion(c.key);
      }
    };

    wrap.appendChild(header);
    wrap.appendChild(body);
    list.appendChild(wrap);
  });
}

function openAccordion(key) {
  // 他を全部閉じる
  CATEGORIES.forEach(c => {
    if (c.key !== key) closeAccordion(c.key);
  });
  const body = document.getElementById('cat-body-' + key);
  const chevron = document.getElementById('cat-chevron-' + key);
  if (body) body.classList.add('open');
  if (chevron) chevron.classList.add('open');
  renderAccordionBody(key);
}

function closeAccordion(key) {
  const body = document.getElementById('cat-body-' + key);
  const chevron = document.getElementById('cat-chevron-' + key);
  if (body) body.classList.remove('open');
  if (chevron) chevron.classList.remove('open');
}

function renderAccordionBody(key) {
  const body = document.getElementById('cat-body-' + key);
  if (!body) return;

  const evs = EVENTS
    .filter(e => e.cat === key && activeMembers.has(e.member))
    .sort((a, b) => a.date.localeCompare(b.date));

  if (evs.length === 0) {
    body.innerHTML = `<div class="acc-ev-list"><div class="acc-ev-empty">タスクなし</div><button class="acc-ev-item" style="width:100%;text-align:left;border:1px dashed rgba(6,182,212,0.4);border-radius:6px;background:transparent;color:#22d3ee;cursor:pointer;font-size:11px;padding:6px 8px;margin-top:4px;" onclick="openAddForm(null, true)">＋ タスクを追加</button></div>`;
    return;
  }

  // タスクカテゴリーは個別表示（チェックボックス風、グループ化なし）
  if (key === 'task') {
    const items = evs.map((ev) => {
      const mem = memberMap[ev.member];
      const d = ev.date.replace(/^2026-/, '');
      const idx = EVENTS.indexOf(ev);
      return `<div class="acc-ev-item" data-task-idx="${idx}" style="position:relative;">
        <div style="width:12px;height:12px;border:1.5px solid #06b6d4;border-radius:3px;flex-shrink:0;margin-top:3px;"></div>
        <div class="acc-ev-info">
          <div class="acc-ev-title">${escHtml(ev.title)}</div>
          <div class="acc-ev-meta" style="color:#22d3ee">${escHtml(mem.name)} · ${d} ${ev.time !== '終日' ? ev.time : '終日'}</div>
        </div>
        <div style="font-size:10px;color:#22d3ee;opacity:0.6;flex-shrink:0;">✏</div>
      </div>`;
    }).join('');
    body.innerHTML = `<div class="acc-ev-list">${items}<button id="add-task-btn" style="width:100%;text-align:left;border:1px dashed rgba(6,182,212,0.4);border-radius:6px;background:transparent;color:#22d3ee;cursor:pointer;font-size:11px;padding:6px 8px;margin-top:4px;display:flex;align-items:center;gap:6px;">＋ タスクを追加</button></div>`;
    // イベント登録
    body.querySelectorAll('[data-task-idx]').forEach(el => {
      el.addEventListener('click', () => openTaskEdit(parseInt(el.dataset.taskIdx)));
    });
    const addBtn = body.querySelector('#add-task-btn');
    if (addBtn) addBtn.addEventListener('click', () => openAddForm(null, true));
    return;
  }

  // プロジェクト名の正規化マップ（部分一致で共通キーに統一）
  const PROJECT_NORMALIZE = [
    { pattern: /メクリメクル/,       label: 'メクリメクル' },
    { pattern: /エヴァンゲリオン|エヴァ画集|エヴァ/,  label: 'エヴァンゲリオン画集' },
    { pattern: /hololive|ホロライブ|holox|ホロックス|holoX/i, label: 'hololive' },
    { pattern: /COVER|Cover/,        label: 'COVER' },
    { pattern: /スパイ教室/,          label: 'スパイ教室' },
    { pattern: /マイナビ/,            label: 'マイナビ' },
    { pattern: /アイドマ/,            label: 'アイドマ' },
    { pattern: /天海社/,              label: '天海社' },
    { pattern: /角川/,               label: '角川' },
    { pattern: /プルメ/,              label: 'プルメデザイン保守' },
    { pattern: /^定例打ち合わせ$|^ 定例打ち合わせ$|^定例$/, label: '定例打ち合わせ' },
    { pattern: /社内MTG/,             label: '社内MTG' },
    { pattern: /エリアドライブ/,       label: 'エリアドライブ飲み' },
    { pattern: /人間ドック/,           label: '人間ドック' },
    { pattern: /健康診断/,             label: '健康診断' },
    { pattern: /有休|有給/,            label: '有休・有給' },
    { pattern: /半休/,                label: '半休' },
    { pattern: /乳児院/,              label: '乳児院' },
    { pattern: /竹書房/,              label: '竹書房' },
  ];

  // タイトルの正規化：プロジェクト名マップ優先 → 記号・括弧除去
  function shortTitle(t) {
    for (const { pattern, label } of PROJECT_NORMALIZE) {
      if (pattern.test(t)) return label;
    }
    return t
      .replace(/^【[^】]*】\s*/, '')
      .replace(/^〔[^〕]*〕\s*/, '')
      .replace(/\s*[：:_＿].+$/, '')
      .replace(/\s*（.*?）$/, '')
      .replace(/\s*\(.*?\)$/, '')
      .replace(/^\s*(ON|ON渡邉|渡邉)\s*/i, '')
      .trim()
      .slice(0, 18);
  }

  // タイトルの短縮名でグループ化（重複まとめ）
  const groups = {};
  evs.forEach(ev => {
    const k = shortTitle(ev.title);
    if (!groups[k]) groups[k] = { label: k, fullTitle: ev.title, dates: [], members: new Set() };
    groups[k].dates.push(ev.date);
    groups[k].members.add(ev.member);
  });

  const items = Object.values(groups).map(g => {
    const memberColors = [...g.members].map(k => memberMap[k]?.color || '#888');
    const dotsHtml = memberColors.map(c =>
      `<div style="width:5px;height:5px;border-radius:50%;background:${c};flex-shrink:0;margin-top:5px;"></div>`
    ).join('');

    const count = g.dates.length;
    const earliest = g.dates[0].replace(/^2026-/, '');
    const latest   = g.dates[g.dates.length - 1].replace(/^2026-/, '');
    const dateRange = count === 1 ? earliest : `${earliest} 〜 ${latest}`;
    const memberNames = [...g.members].map(k => memberMap[k]?.name || k).join('・');
    const isGanttActive = currentView === 'gantt' && ganttTitleFilter === g.label;

    return `<div class="acc-ev-item${isGanttActive?' gantt-item-active':''}" data-grouplabel="${g.label.replace(/"/g,'&quot;')}" data-firstdate="${g.dates[0]}">
      <div style="display:flex;gap:2px;flex-shrink:0;">${dotsHtml}</div>
      <div class="acc-ev-info">
        <div class="acc-ev-title">${g.label}</div>
        <div class="acc-ev-meta">${memberNames}${count > 1 ? ` · ${count}件 · ${dateRange}` : ` · ${dateRange}`}</div>
      </div>
      ${isGanttActive ? '<div style="font-size:9px;color:var(--accent2);flex-shrink:0;">絞込中</div>' : ''}
    </div>`;
  }).join('');

  body.innerHTML = `<div class="acc-ev-list">${items}</div>`;

  // イベント登録
  body.querySelectorAll('[data-grouplabel]').forEach(el => {
    el.addEventListener('click', () => {
      const label = el.dataset.grouplabel;
      const date  = el.dataset.firstdate;
      if (currentView === 'gantt') {
        // ガント表示中：タイトルフィルターで絞り込み
        if (ganttTitleFilter === label) {
          ganttTitleFilter = null;
        } else {
          ganttTitleFilter = label;
        }
        renderAccordionBody(key); // key はクロージャでキャプチャ済み
        renderGanttChart();
      } else {
        // カレンダー表示中：その日にジャンプ
        jumpToDate(date);
      }
    });
  });
}

function jumpToDate(dateStr) {
  const [y, m] = dateStr.split('-').map(Number);
  cur = new Date(y, m - 1, 1);
  renderGrid();
  // 少し遅延して詳細パネルを開く
  setTimeout(() => {
    const d = parseInt(dateStr.split('-')[2]);
    const evs = eventsOnDate(y, m - 1, d);
    showDetail(y, m - 1, d);
  }, 50);
}

function toggleSoloCategory(key) {
  if (soloCategory === key) {
    exitSoloCategory();
  } else {
    soloCategory = key;
    activeCategories = new Set([key]);
    // ガントのカテゴリーフィルターも連動
    ganttCatFilter = key;
    syncGanttFilterBtns();
    renderCategoryChips();
    updateCategoryBanner(key);
    renderGrid();
    if (currentView === 'gantt') renderGanttChart();
  }
}

function exitSoloCategory() {
  soloCategory = null;
  activeCategories = new Set(CATEGORIES.map(c => c.key));
  // ガントも全表示に戻す
  ganttCatFilter = 'all';
  syncGanttFilterBtns();
  CATEGORIES.forEach(c => closeAccordion(c.key));
  renderCategoryChips();
  updateCategoryBanner(null);
  renderGrid();
  if (currentView === 'gantt') renderGanttChart();
}

// ガントのフィルターボタンのactive状態を同期
function syncGanttFilterBtns() {
  const bar = document.getElementById('gantt-controls-bar');
  if (!bar) return;
  bar.querySelectorAll('[data-gcat]').forEach(b =>
    b.classList.toggle('active', b.dataset.gcat === ganttCatFilter)
  );
}

function renderCategoryChips() {
  CATEGORIES.forEach(c => {
    const item = document.getElementById('cat-' + c.key);
    if (!item) return;
    item.classList.toggle('active', soloCategory === c.key);
    item.classList.toggle('off', soloCategory !== null && soloCategory !== c.key);
  });
  const allItem = document.getElementById('cat-all');
  if (allItem) allItem.classList.toggle('active', soloCategory === null);
  updateCategoryCounts();
}

function updateCategoryCounts() {
  CATEGORIES.forEach(c => {
    const el = document.getElementById('cat-count-' + c.key);
    if (!el) return;
    const count = EVENTS.filter(e => e.cat === c.key && activeMembers.has(e.member)).length;
    el.textContent = count;
    // アコーディオンが開いていれば中身も更新
    const body = document.getElementById('cat-body-' + c.key);
    if (body && body.classList.contains('open')) renderAccordionBody(c.key);
  });
}

function updateCategoryBanner(key) {
  let banner = document.getElementById('cat-banner');
  if (!key) { if (banner) banner.remove(); return; }
  const cat = catMap[key];
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'cat-banner';
    const soloBanner = document.getElementById('solo-banner');
    const calHeader = document.querySelector('.cal-header');
    (soloBanner || calHeader).after(banner);
  }
  banner.style.cssText = `display:flex;align-items:center;gap:10px;padding:6px 24px;font-size:12px;border-bottom:1px solid var(--border);background:${cat.bg};`;
  banner.innerHTML = `
    <span style="font-size:14px;">${cat.icon}</span>
    <span style="color:${cat.text};font-weight:600;">${cat.name}</span>
    <span style="color:${cat.text};opacity:0.7;">のみ表示中</span>
    <button onclick="exitSoloCategory()" style="margin-left:auto;padding:2px 10px;border-radius:99px;border:1px solid ${cat.color};background:transparent;color:${cat.text};font-size:11px;cursor:pointer;">✕ すべて表示</button>`;
}

// ─── Events helpers ───
function eventsOnDate(y, m, d) {
  const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return EVENTS.filter(e =>
    e.date === key &&
    activeMembers.has(e.member) &&
    activeCategories.has(e.cat || detectCategory(e.title))
  );
}

// ─── Init Members ───
function initMembers() {
  const list = document.getElementById('member-list');
  MEMBERS.forEach(m => {
    const item = document.createElement('div');
    item.className = 'member-item';
    item.id = 'member-' + m.key;
    item.title = 'シングルクリック: 表示ON/OFF　ダブルクリック: このメンバーのみ表示';
    item.innerHTML = `
      <div class="member-dot" style="background:${m.color}"></div>
      <div style="flex:1">
        <div class="member-name">${m.name}</div>
        <div class="member-email">${m.email}</div>
      </div>
      <div class="solo-badge" id="solo-badge-${m.key}" style="display:none;font-size:9px;padding:2px 6px;border-radius:99px;background:${m.bg || 'rgba(255,255,255,0.1)'};color:${m.text || '#fff'};border:1px solid ${m.color};white-space:nowrap;">表示中</div>`;
    item.onclick  = (e) => { if (e.detail === 1) setTimeout(() => { if (!item._dblclicked) toggleMember(m.key); item._dblclicked = false; }, 220); };
    item.ondblclick = (e) => { item._dblclicked = true; enterSoloMode(m.key); };
    list.appendChild(item);
  });
}

// ソロモード（ダブルクリックで1人だけ表示）
function enterSoloMode(key) {
  if (soloMember === key) { exitSoloMode(); return; }
  soloMember = key;
  activeMembers = new Set([key]);
  renderMemberChips();
  updateSoloBanner(key);
  renderGrid();
  if (currentView === 'gantt') renderGanttChart();
}

function exitSoloMode() {
  soloMember = null;
  activeMembers = new Set(MEMBERS.map(m => m.key));
  renderMemberChips();
  updateSoloBanner(null);
  renderGrid();
  if (currentView === 'gantt') renderGanttChart();
}

function renderMemberChips() {
  MEMBERS.forEach(m => {
    const item = document.getElementById('member-' + m.key);
    if (item) item.classList.toggle('off', !activeMembers.has(m.key));
    const badge = document.getElementById('solo-badge-' + m.key);
    if (badge) badge.style.display = (soloMember === m.key) ? 'block' : 'none';
  });
}

function updateSoloBanner(key) {
  let banner = document.getElementById('solo-banner');
  if (!key) {
    if (banner) banner.remove();
    document.getElementById('cal-title-sub') && document.getElementById('cal-title-sub').remove();
    return;
  }
  const mem = memberMap[key];
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'solo-banner';
    banner.style.cssText = `display:flex;align-items:center;gap:10px;padding:6px 24px;font-size:12px;border-bottom:1px solid var(--border);background:${mem.bg};`;
    const calHeader = document.querySelector('.cal-header');
    calHeader.after(banner);
  }
  banner.innerHTML = `
    <div style="width:8px;height:8px;border-radius:50%;background:${mem.color};flex-shrink:0"></div>
    <span style="color:${mem.text};font-weight:600">${mem.name}</span>
    <span style="color:${mem.text};opacity:0.7">さんの予定のみ表示中</span>
    <span style="color:${mem.text};opacity:0.5;font-size:11px">（ダブルクリックで全員表示に戻る）</span>
    <button onclick="exitSoloMode()" style="margin-left:auto;padding:2px 10px;border-radius:99px;border:1px solid ${mem.color};background:transparent;color:${mem.text};font-size:11px;cursor:pointer;">✕ 全員に戻す</button>`;
}

function toggleMember(key) {
  if (soloMember) { exitSoloMode(); return; }
  if (activeMembers.has(key)) activeMembers.delete(key);
  else activeMembers.add(key);
  renderMemberChips();
  renderGrid();
  if (currentView === 'gantt') renderGanttChart();
}

// ─── Mini Calendar ───
function renderMini() {
  const y = cur.getFullYear(), m = cur.getMonth();
  document.getElementById('mini-title').textContent = `${y}年${m+1}月`;
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const prev = new Date(y,m,0).getDate();
  const wrap = document.getElementById('mini-grid-cells');
  wrap.style.display = 'contents';
  wrap.innerHTML = '';
  let cells = [];
  for (let i=first-1; i>=0; i--) cells.push({d:prev-i, cur:false});
  for (let d=1; d<=days; d++) cells.push({d, cur:true});
  while(cells.length%7!==0) cells.push({d:cells.length-days-first+1, cur:false});
  cells.forEach(c => {
    const div = document.createElement('div');
    div.className = 'mini-day' + (c.cur?'':' other');
    const isToday = c.cur && y===today.getFullYear() && m===today.getMonth() && c.d===today.getDate();
    if(isToday) div.classList.add('today');
    const hasEv = c.cur && eventsOnDate(y,m,c.d).length > 0;
    if(hasEv) div.classList.add('has-events');
    div.textContent = c.d;
    if(c.cur) div.onclick = () => showDetail(y,m,c.d);
    wrap.appendChild(div);
  });
}

// ─── Main Grid ───
function renderGrid() {
  const y = cur.getFullYear(), m = cur.getMonth();
  const titleEl = document.getElementById('cal-title');
  if (soloMember) {
    const mem = memberMap[soloMember];
    titleEl.innerHTML = `${y}年 ${m+1}月 <span style="font-size:13px;font-weight:400;color:${mem.color};margin-left:8px;">— ${mem.name}</span>`;
  } else {
    titleEl.textContent = `${y}年 ${m+1}月`;
  }
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const prev = new Date(y,m,0).getDate();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  let cells = [];
  for(let i=first-1;i>=0;i--) cells.push({d:prev-i,cur:false,mn:m-1,yr:m===0?y-1:y});
  for(let d=1;d<=days;d++) cells.push({d,cur:true,mn:m,yr:y});
  while(cells.length%7!==0) cells.push({d:cells.length-days-first+1,cur:false,mn:m+1,yr:m===11?y+1:y});
  cells.forEach(c => {
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (c.cur?'':' other-month');
    const isToday = c.cur && c.yr===today.getFullYear() && c.mn===today.getMonth() && c.d===today.getDate();
    if(isToday) cell.classList.add('today');
    const dateStr = c.cur ? `${c.yr}-${String(c.mn+1).padStart(2,'0')}-${String(c.d).padStart(2,'0')}` : '';
    const evs = c.cur ? eventsOnDate(c.yr,c.mn,c.d) : [];
    const addBtn = c.cur ? `<button class="cell-add-btn" title="予定を追加">+</button>` : '';
    cell.innerHTML = `<div class="cell-day-row"><div class="cell-day">${c.d}</div>${addBtn}</div>`;
    if(c.cur) {
      cell.querySelector('.cell-add-btn')?.addEventListener('click', e => {
        e.stopPropagation();
        openAddForm(dateStr);
      });
    }
    evs.slice(0,3).forEach(ev => {
      const mem = memberMap[ev.member];
      const cat = catMap[ev.cat] || catMap['other'];
      const chip = document.createElement('div');
      chip.className = 'ev-chip' + (ev.isTask ? ' is-task' : '');
      const taskIcon = ev.isTask ? '<span class="task-check"></span>' : '';
      chip.style.cssText = `background:${ev.isTask ? 'rgba(6,182,212,0.2)' : mem.bg};color:${ev.isTask ? '#22d3ee' : mem.text};border-left:2px solid ${cat.color};padding-left:4px;`;
      chip.innerHTML = `${taskIcon}${mem.name[0]}:${ev.title}`;
      chip.title = `[${ev.isTask ? 'タスク' : cat.name}] ${mem.name}：${ev.title} ${ev.time}`;
      cell.appendChild(chip);
    });
    if(evs.length>3) {
      const more = document.createElement('div');
      more.className = 'ev-more';
      more.textContent = `+${evs.length-3}件`;
      cell.appendChild(more);
    }
    if(c.cur) {
      cell.addEventListener('click', () => showDetail(c.yr,c.mn,c.d));
      cell.addEventListener('contextmenu', e => showCtxMenu(e, c.yr, c.mn, c.d));
    }
    grid.appendChild(cell);
  });
  renderMini();
  // グリッド再描画後にズーム再適用
  if (typeof applyZoom === 'function') applyZoom();
}

// ─── Detail Panel ───
function showDetail(y, m, d) {
  selectedDate = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const evs = eventsOnDate(y,m,d);
  const jp=['日','月','火','水','木','金','土'];
  const dow = jp[new Date(y,m,d).getDay()];
  document.getElementById('panel-title').textContent = `${y}年${m+1}月${d}日（${dow}）`;
  if(evs.length===0) {
    const bodyEl = document.getElementById('panel-body');
    bodyEl.innerHTML = `<div class="empty-day">予定なし</div><button id="empty-add-btn" class="add-day-btn">＋ この日に予定を追加</button>`;
    bodyEl.querySelector('#empty-add-btn').addEventListener('click', () => openAddForm(selectedDate));
  } else {
    const bodyEl = document.getElementById('panel-body');
    bodyEl.innerHTML = evs.map(ev => {
      const mem = memberMap[ev.member];
      const cat = catMap[ev.cat] || catMap['other'];
      const evIdx = EVENTS.indexOf(ev);
      const dotColor = ev.isTask ? '#22d3ee' : mem.color;
      const nameColor = ev.isTask ? '#22d3ee' : mem.color;
      const badge = ev.isTask
        ? `<span style="font-size:9px;padding:1px 6px;border-radius:99px;background:rgba(6,182,212,0.18);color:#22d3ee;border:1px solid rgba(6,182,212,0.35);">✅ タスク</span>`
        : `<span style="font-size:9px;padding:1px 5px;border-radius:99px;background:${cat.bg};color:${cat.text};">${cat.icon} ${cat.name}</span>`;
      const locHtml = ev.location ? `<div style="font-size:10px;color:var(--text3);margin-top:2px;">📍 ${escHtml(ev.location)}</div>` : '';
      const descHtml = ev.description ? `<div style="font-size:10px;color:var(--text3);margin-top:2px;white-space:pre-wrap;">${escHtml(ev.description.replace(/<[^>]+>/g,''))}</div>` : '';

    // イベント登録：全予定クリックで編集
    bodyEl.querySelectorAll('[data-ev-idx]').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.evIdx);
        const ev = EVENTS[idx];
        if (!ev) return;
        if (ev.isTask) openTaskEdit(idx);
        else openEventEdit(idx);

    if (addEvBtn) addEvBtn.addEventListener('click', () => openAddForm(selectedDate));

  openPanel();

function submitEventEdit(evIdx) {
  const ev = EVENTS[evIdx];
  if (!ev) return;
  const title      = document.getElementById('ee-title')?.value.trim();
  const memberKey  = document.getElementById('ee-member')?.value;
  const catKey     = document.getElementById('ee-cat')?.value || 'other';
  const type       = document.getElementById('ee-type')?.value;
  const location   = document.getElementById('ee-location')?.value.trim();
  const desc       = document.getElementById('ee-desc')?.value.trim();
  const attendeeStr= document.getElementById('ee-attendees')?.value.trim();
  const reminderVal= document.getElementById('ee-reminder')?.value;
  const reminderMin= (reminderVal && reminderVal !== 'none') ? parseInt(reminderVal) : null;
  if (!title) { showStatus('ee-status','error','タイトルを入力してください'); return; }

  const mem = memberMap[memberKey];
  let dateKey, timeLabel, startStr, endStr;
  if (type === 'allday') {
    dateKey = document.getElementById('ee-date')?.value;
    if (!dateKey) { showStatus('ee-status','error','日付を入力してください'); return; }
    timeLabel = '終日'; startStr = dateKey; endStr = null;
  } else {
    const s = document.getElementById('ee-start')?.value;
    const e = document.getElementById('ee-end')?.value;
    if (!s||!e) { showStatus('ee-status','error','開始・終了日時を入力してください'); return; }
    dateKey = s.split('T')[0];
    timeLabel = `${s.split('T')[1]}-${e.split('T')[1]}`;
    startStr = s + ':00+09:00';
    endStr   = e + ':00+09:00';
  }

  // ローカル更新
  ev.title       = title;
  ev.member      = memberKey;
  ev.cat         = catKey;
  ev.date        = dateKey;
  ev.time        = timeLabel;
  ev.location    = location;
  ev.description = desc;
  ev.attendees   = attendeeStr ? attendeeStr.split(',').map(s=>s.trim()).filter(Boolean) : [];
  ev.reminderMin = reminderMin;
  // Web通知スケジュール登録
  if (reminderMin !== null) scheduleWebNotification(ev);
  renderGrid();
  updateCategoryCounts();

  // Googleカレンダー反映プロンプト
  const calId = ev.calId || mem.email;
  let prompt = ev.eventId
    ? `Googleカレンダー（${calId}）のイベントID「${ev.eventId}」を以下の内容に更新してください。\n`
    : `Googleカレンダー（${calId}）に以下の予定を追加してください。\n`;
  prompt += `タイトル: ${title}\n`;
  if (type==='allday') {
    prompt += `日付: ${startStr}（終日）\n`;
  } else {
    prompt += `開始: ${startStr}（Asia/Tokyo）\n終了: ${endStr}（Asia/Tokyo）\n`;
  }
  if (location)    prompt += `場所: ${location}\n`;
  if (desc)        prompt += `説明: ${desc}\n`;
  if (attendeeStr) prompt += `参加者: ${attendeeStr}\n`;
  if (reminderMin !== null) {
    const h = Math.floor(reminderMin / 60), min = reminderMin % 60;
    prompt += `リマインダー: 当日${h}時${min>0?min+'分':''}にポップアップ通知（${reminderMin}分前）\n`;
  }
  prompt += `更新後にカレンダーへの反映を確認してください。`;

  navigator.clipboard?.writeText(prompt).catch(()=>{});
  showStatus('ee-status','success','保存しました！');
  setTimeout(() => {
    const el = document.getElementById('ee-status');
    if (el) el.innerHTML = `
      <div class="status-badge success">保存しました！</div>
      <div class="status-badge info" style="margin-top:6px;font-size:10px;line-height:1.5;">
        Claudeに貼り付けてGoogleカレンダーに反映：<br>
        <textarea style="width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:5px;color:${mem.text};font-size:10px;padding:5px;margin-top:4px;font-family:monospace;resize:none;height:80px;">${prompt}</textarea>
      </div>`;
  }, 300);
}

function deleteEvent(evIdx) {
  const ev = EVENTS[evIdx];
  if (!ev) return;
  if (!confirm(`「${ev.title}」を削除しますか？`)) return;
  const mem = memberMap[ev.member];
  const calId = ev.calId || mem.email;
  const prompt = ev.eventId
    ? `Googleカレンダー（${calId}）のイベントID「${ev.eventId}」の予定「${ev.title}」を削除してください。`
    : '';
  EVENTS.splice(evIdx, 1);
  renderGrid();
  updateCategoryCounts();
  closePanel();
  if (prompt) {
    navigator.clipboard?.writeText(prompt).catch(()=>{});
    alert(`削除しました。\n\nClaudeに以下を貼り付けてGoogleカレンダーにも反映してください：\n\n${prompt}`);
  }
}

  if (!confirm(`「${ev.title}」を削除しますか？`)) return;
  const mem = memberMap[ev.member];
  const prompt = ev.taskId
    ? `Googleカレンダー（${ev.calId || mem.email}）のイベントID「${ev.taskId}」のタスク「${ev.title}」を削除してください。`
    : '';
  EVENTS.splice(evIdx, 1);
  renderGrid();
  updateCategoryCounts();
  renderAccordionBody('task');
  closePanel();
  if (prompt) {
    navigator.clipboard?.writeText(prompt).catch(() => {});
    alert('削除しました。\n\nClaudeに以下を貼り付けてGoogleカレンダーにも反映してください：\n\n' + prompt);
  }
}

function submitEvent() {

  bar.addEventListener('click', e => {

// アコーディオンと共通のタイトル正規化（ガントフィルター用）
function shortTitleForGantt(t) {
  const PROJECT_NORMALIZE = [
    { pattern: /メクリメクル/,       label: 'メクリメクル' },
    { pattern: /エヴァンゲリオン|エヴァ画集|エヴァ/,  label: 'エヴァンゲリオン画集' },
    { pattern: /hololive|ホロライブ|holox|ホロックス|holoX/i, label: 'hololive' },
    { pattern: /COVER|Cover/,        label: 'COVER' },
    { pattern: /スパイ教室/,          label: 'スパイ教室' },
    { pattern: /マイナビ/,            label: 'マイナビ' },
    { pattern: /アイドマ/,            label: 'アイドマ' },
    { pattern: /天海社/,              label: '天海社' },
    { pattern: /角川/,               label: '角川' },
    { pattern: /プルメ/,              label: 'プルメデザイン保守' },
    { pattern: /^定例打ち合わせ$|^ 定例打ち合わせ$|^定例$/, label: '定例打ち合わせ' },
    { pattern: /社内MTG/,             label: '社内MTG' },
    { pattern: /エリアドライブ/,       label: 'エリアドライブ飲み' },
    { pattern: /人間ドック/,           label: '人間ドック' },
    { pattern: /健康診断/,             label: '健康診断' },
    { pattern: /有休|有給/,            label: '有休・有給' },
    { pattern: /半休/,                label: '半休' },
    { pattern: /乳児院/,              label: '乳児院' },
    { pattern: /竹書房/,              label: '竹書房' },
  ];
  for (const { pattern, label } of PROJECT_NORMALIZE) {
    if (pattern.test(t)) return label;
  }
  return t
    .replace(/^【[^】]*】\s*/, '')
    .replace(/^〔[^〕]*〕\s*/, '')
    .replace(/\s*[：:_＿].+$/, '')
    .replace(/\s*（.*?）$/, '')
    .replace(/\s*\(.*?\)$/, '')
    .replace(/^\s*(ON|ON渡邉|渡邉)\s*/i, '')
    .trim()
    .slice(0, 18);
}

function renderGantt() {

}

function renderGanttChart() {
  const inner = document.getElementById('gantt-inner');
  const today  = new Date();
  const DAY_W  = GANTT_ZOOM_STEPS[ganttZoomIdx];

  // 表示範囲の決定
  let rangeStart, months, rangeStartStr, rangeEndStr;
  if (ganttRangeMode === 'month') {
    rangeStart    = new Date(2026, ganttMonth, 1);
    const days    = new Date(2026, ganttMonth + 1, 0).getDate();
    months        = [{ m: ganttMonth, days, label: `2026年${ganttMonth+1}月` }];
    rangeStartStr = `2026-${String(ganttMonth+1).padStart(2,'0')}-01`;
    rangeEndStr   = `2026-${String(ganttMonth+1).padStart(2,'0')}-${String(days).padStart(2,'0')}`;
  } else {
    rangeStart    = new Date(2026, 0, 1);
    months        = [];
    for (let m = 0; m < 12; m++) {
      const days = new Date(2026, m + 1, 0).getDate();
      months.push({ m, days, label: `${m+1}月` });
    }
    rangeStartStr = '2026-01-01';
    rangeEndStr   = '2026-12-31';
  }

  function dayOffset(dateStr) {
    const d = new Date(dateStr);
    return Math.max(0, Math.floor((d - rangeStart) / 86400000)) * DAY_W;
  }

  const totalWidth = months.reduce((s, mo) => s + mo.days, 0) * DAY_W;

  const filtered = EVENTS.filter(ev =>
    activeMembers.has(ev.member) &&
    (ganttCatFilter === 'all' || ev.cat === ganttCatFilter) &&
    ev.date >= rangeStartStr && ev.date <= rangeEndStr &&
    (ganttTitleFilter === null || shortTitleForGantt(ev.title) === ganttTitleFilter)
  );
  const byMember = {};
  filtered.forEach(ev => {
    if (!byMember[ev.member]) byMember[ev.member] = [];
    byMember[ev.member].push(ev);
  });

  const todayStr    = today.toISOString().split('T')[0];
  const todayOffset = (todayStr >= rangeStartStr && todayStr <= rangeEndStr)
    ? dayOffset(todayStr) : -1;

  // ─ タイトルフィルターバナー ─
  if (ganttTitleFilter) {
    html += `<div style="display:flex;align-items:center;gap:10px;padding:6px 16px;background:rgba(108,99,255,0.12);border-bottom:1px solid var(--border);font-size:12px;">
      <span style="color:var(--accent2);">🔍</span>
      <span style="color:var(--text);font-weight:500;">${ganttTitleFilter}</span>
      <span style="color:var(--text3);">のみ表示中</span>
      <button data-cleartitlefilter style="margin-left:auto;padding:2px 10px;border-radius:99px;border:1px solid var(--accent);background:transparent;color:var(--accent2);font-size:11px;cursor:pointer;font-family:inherit;">✕ 解除</button>
    </div>`;
  }

  // ─ ヘッダー ─
  let html = `
  <div class="gantt-wrap">
    <div class="gantt-header">
      <div class="gantt-label-col">メンバー / 予定</div>
      <div class="gantt-timeline-header">`;

  months.forEach(({m, days, label}) => {
    html += `<div class="gantt-month-block" style="width:${days*DAY_W}px">
      <div class="gantt-month-label">${label}</div>
      <div class="gantt-days-row">`;
    for (let d = 1; d <= days; d++) {
      const date  = new Date(2026, m, d);
      const w     = date.getDay();
      const isTd  = date.toISOString().split('T')[0] === todayStr;
      const dayLabel = DAY_W >= 22 ? d : (d % 5 === 1 ? d : '');
      html += `<div class="gantt-day-cell${isTd?' today':''}${(w===0||w===6)?' weekend':''}" style="width:${DAY_W}px;">${dayLabel}</div>`;
    }
    html += `</div></div>`;
  });

  html += `</div></div>`;

  // ─ メンバー行 ─
  MEMBERS.filter(m => activeMembers.has(m.key)).forEach(mem => {
    const evs = (byMember[mem.key] || []).sort((a,b)=>a.date.localeCompare(b.date));
    if (!evs.length) return;

    html += `<div class="gantt-row member-header">
      <div class="gantt-name">
        <div class="gantt-name-dot" style="background:${mem.color}"></div>
        <div>
          <div class="gantt-name-text" style="color:${mem.color}">${mem.name}</div>
          <div class="gantt-name-sub">${evs.length}件</div>
        </div>
      </div>
      <div class="gantt-bars" style="position:relative;height:28px;width:${totalWidth}px;">
        ${buildGridLines(months, DAY_W, 28)}
        <div class="gantt-today-line" data-todayline="1" title="今日 — クリックで今月に移動" style="cursor:pointer;left:${todayOffset}px;display:${todayOffset<0?'none':'block'}"></div>
      </div>
    </div>`;

    const catGroups = {};
    evs.forEach(ev => {
      const ck = ev.cat || 'other';
      if (!catGroups[ck]) catGroups[ck] = [];
      catGroups[ck].push(ev);
    });

    Object.entries(catGroups).forEach(([ck, cevs]) => {
      const cat = catMap[ck] || catMap['other'];
      const lanes = [];
      cevs.forEach(ev => {
        let placed = false;
        for (const lane of lanes) {
          if (lane[lane.length-1].date < ev.date) { lane.push(ev); placed = true; break; }
        }
        if (!placed) lanes.push([ev]);
      });

      lanes.forEach(lane => {
        const ROW_H = 32;
        html += `<div class="gantt-row" style="min-height:${ROW_H}px;">
          <div class="gantt-name" style="padding-left:28px;">
            <div style="font-size:10px;color:${cat.text};background:${cat.bg};padding:1px 7px;border-radius:99px;white-space:nowrap;">${cat.icon} ${cat.name}</div>
          </div>
          <div class="gantt-bars" style="position:relative;height:${ROW_H}px;width:${totalWidth}px;">
            ${buildGridLines(months, DAY_W, ROW_H)}
            <div class="gantt-today-line" data-todayline="1" title="今日 — クリックで今月に移動" style="cursor:pointer;left:${todayOffset}px;display:${todayOffset<0?'none':'block'}"></div>`;

        lane.forEach(ev => {
          const x = dayOffset(ev.date);
          const barTitle = ev.title.replace(/^【[^】]*】\s*/,'').replace(/\s*[：:_].+$/,'').slice(0, DAY_W < 22 ? 8 : 20);
          html += `<div class="gantt-bar" data-evdate="${ev.date}" style="left:${x}px;width:${Math.max(DAY_W-2,4)}px;background:${cat.bg};color:${cat.text};border:1px solid ${cat.color}55;top:7px;cursor:pointer;" title="📅 ${mem.name}：${ev.title} ${ev.date}&#10;クリックでカレンダーへジャンプ">${DAY_W >= 22 ? barTitle : ''}</div>`;
        });

        html += `</div></div>`;
      });
    });
  });

  html += `</div>`;
  inner.innerHTML = html;

  // イベント委譲：バークリック＋今日ラインクリック＋タイトルフィルター解除
  inner.addEventListener('click', e => {
    // タイトルフィルター解除
    if (e.target.closest('[data-cleartitlefilter]')) {
      ganttTitleFilter = null;
      // アコーディオン内のハイライトも更新
      if (soloCategory) renderAccordionBody(soloCategory);
      renderGanttChart();
      return;
    }
    // ガントバー → カレンダーの該当日にジャンプ
    const bar = e.target.closest('[data-evdate]');
    if (bar) { ganttBarJumpToCalendar(bar.dataset.evdate); return; }

    // 今日ライン → カレンダーの今月に切り替え
    const todayLine = e.target.closest('[data-todayline]');
    if (todayLine) {
      const t = new Date();
      cur = new Date(t.getFullYear(), t.getMonth(), 1);
      switchView('calendar');
    }
  });
}

// グリッド線HTML生成（月境界線 + 日付縦線）
function buildGridLines(months, DAY_W, height) {
  let lines = '';
  let x = 0;
  months.forEach(({m, days}) => {
    // 月区切り（太め）
    lines += `<div style="position:absolute;left:${x}px;top:0;width:1px;height:${height}px;background:var(--border2);z-index:1;"></div>`;
    for (let d = 1; d <= days; d++) {
      const date  = new Date(2026, m, d);
      const w     = date.getDay();
      const color = (w === 0 || w === 6) ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.025)';
      // 日付背景帯（土日は少し濃い）
      lines += `<div style="position:absolute;left:${x}px;top:0;width:${DAY_W}px;height:${height}px;background:${color};z-index:0;"></div>`;
      // 右辺の縦線
      lines += `<div style="position:absolute;left:${x + DAY_W - 1}px;top:0;width:0.5px;height:${height}px;background:var(--border);z-index:1;"></div>`;
      x += DAY_W;
    }
  });
  return lines;
}

// ─── Zoom ───
const ZOOM_STEPS = [60, 75, 90, 100, 115, 130, 150, 175, 200];
const ZOOM_DEFAULT_IDX = 3; // 100%
let zoomIdx = ZOOM_DEFAULT_IDX;

function applyZoom() {
  const pct = ZOOM_STEPS[zoomIdx];
  const scale = pct / 100;

  // cal-cell の min-height をスケール
  const baseH = 140;
  document.querySelectorAll('.cal-cell').forEach(el => {
    el.style.minHeight = Math.round(baseH * scale) + 'px';
  });

  // ev-chip のフォントサイズをスケール
  const baseFontSize = 10;
  document.querySelectorAll('.ev-chip').forEach(el => {
    el.style.fontSize = Math.round(baseFontSize * scale) + 'px';
  });

  // cell-day のフォントサイズ
  document.querySelectorAll('.cell-day').forEach(el => {
    el.style.fontSize = Math.round(12 * scale) + 'px';
  });

  // ラベル更新
  document.getElementById('zoom-label').textContent = pct + '%';
  document.getElementById('zoom-out').disabled = zoomIdx <= 0;
  document.getElementById('zoom-in').disabled  = zoomIdx >= ZOOM_STEPS.length - 1;
  document.getElementById('zoom-out').style.opacity = zoomIdx <= 0 ? '0.3' : '1';
  document.getElementById('zoom-in').style.opacity  = zoomIdx >= ZOOM_STEPS.length - 1 ? '0.3' : '1';

  // localStorage に保存
  localStorage.setItem('csd_zoom_idx', zoomIdx);
}

function zoomIn()    { if (zoomIdx < ZOOM_STEPS.length - 1) { zoomIdx++; applyZoom(); } }
function zoomOut()   { if (zoomIdx > 0) { zoomIdx--; applyZoom(); } }
function zoomReset() { zoomIdx = ZOOM_DEFAULT_IDX; applyZoom(); }

// ─── Notification System ───
const NOTIF_STORE_KEY = 'csd_notif_schedules';
let notifTimers = {};

// ブラウザ通知許可を確認・要求
async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const result = await Notification.requestPermission();
  return result === 'granted';
}

// トースト表示（アプリ内通知）
function showToast(title, body, color) {
  const container = document.getElementById('notif-container');
  const toast = document.createElement('div');
  toast.className = 'notif-toast';
  toast.style.pointerEvents = 'auto';
  toast.innerHTML = `
    <div class="notif-bell" style="background:${color || 'rgba(108,99,255,0.2)'};">🔔</div>
    <div class="notif-body">
      <div class="notif-title">${escHtml(title)}</div>
      <div class="notif-sub">${escHtml(body)}</div>
    </div>
    <button class="notif-close">✕</button>`;
  toast.querySelector('.notif-close').addEventListener('click', () => dismissToast(toast));
  container.appendChild(toast);
  setTimeout(() => dismissToast(toast), 8000);
}

function dismissToast(toast) {
  toast.classList.add('out');
  setTimeout(() => toast.remove(), 280);
}

// ブラウザネイティブ通知
function sendBrowserNotif(title, body, memberColor) {
  if (Notification.permission !== 'granted') return;
  const n = new Notification(`🔔 ${title}`, {
    body,
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="%236c63ff"/><text x="16" y="22" text-anchor="middle" font-size="18" fill="white">C</text></svg>',
    badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="4" fill="%236c63ff"/></svg>',
    tag: `csd-${title}`,
    silent: false,
  });
  n.onclick = () => { window.focus(); n.close(); };
}

// 予定のリマインダーをスケジュール
function scheduleWebNotification(ev) {
  const mem = memberMap[ev.member];
  if (!ev.reminderMin || !ev.date) return;

  // 予定日のAMリマインダー時刻を計算（reminderMinは「当日0:00から何分後か」）
  const evDate = new Date(ev.date + 'T00:00:00+09:00');
  const notifTime = new Date(evDate.getTime() + ev.reminderMin * 60 * 1000);
  const now = new Date();
  const msUntil = notifTime - now;

  // スケジュールID
  const schedId = `${ev.date}_${ev.title}_${ev.reminderMin}`;

  // 既存タイマーをクリア
  if (notifTimers[schedId]) clearTimeout(notifTimers[schedId]);

  // 過去の場合はスキップ
  if (msUntil < 0) return;

  // localStorage に保存（ページ再読み込み後も復元）
  const schedules = JSON.parse(localStorage.getItem(NOTIF_STORE_KEY) || '{}');
  schedules[schedId] = {
    title: ev.title,
    memberName: mem?.name || '',
    memberColor: mem?.color || '#6c63ff',
    date: ev.date,
    time: ev.time,
    notifAt: notifTime.toISOString(),
    reminderMin: ev.reminderMin,
  };
  localStorage.setItem(NOTIF_STORE_KEY, JSON.stringify(schedules));

  // タイマーセット
  notifTimers[schedId] = setTimeout(async () => {
    const h = Math.floor(ev.reminderMin / 60), m = ev.reminderMin % 60;
    const timeStr = ev.time !== '終日' ? ev.time : '終日';
    const bodyText = `${mem?.name || ''} · ${ev.date} ${timeStr}`;
    const label = `${h}時${m > 0 ? m + '分' : ''}`;

    // アプリ内トースト
    showToast(`📅 本日の予定: ${ev.title}`, bodyText, mem?.bg);

    // ブラウザ通知
    const granted = await requestNotifPermission();
    if (granted) sendBrowserNotif(`本日の予定: ${ev.title}`, bodyText, mem?.color);

    // スケジュール削除
    const sc = JSON.parse(localStorage.getItem(NOTIF_STORE_KEY) || '{}');
    delete sc[schedId];
    localStorage.setItem(NOTIF_STORE_KEY, JSON.stringify(sc));
  }, msUntil);

  // 設定確認トースト
  const h = Math.floor(ev.reminderMin / 60), m = ev.reminderMin % 60;
  showToast(
    `通知を設定しました`,
    `「${ev.title}」を ${ev.date} ${h}:${String(m).padStart(2,'0')} に通知します`,
    mem?.bg
  );
}

// ページ読み込み時にスケジュール復元
function restoreNotifSchedules() {
  try {
    const schedules = JSON.parse(localStorage.getItem(NOTIF_STORE_KEY) || '{}');
    const now = new Date();
    Object.entries(schedules).forEach(([id, sc]) => {
      const notifAt = new Date(sc.notifAt);
      const ms = notifAt - now;
      if (ms < 0) { delete schedules[id]; return; }
      notifTimers[id] = setTimeout(async () => {
        showToast(`📅 本日の予定: ${sc.title}`, `${sc.memberName} · ${sc.date} ${sc.time}`, sc.memberColor);
        const granted = await requestNotifPermission();
        if (granted) sendBrowserNotif(`本日の予定: ${sc.title}`, `${sc.memberName} · ${sc.date} ${sc.time}`, sc.memberColor);
        const s = JSON.parse(localStorage.getItem(NOTIF_STORE_KEY) || '{}');
        delete s[id];
        localStorage.setItem(NOTIF_STORE_KEY, JSON.stringify(s));
      }, ms);
    });
    localStorage.setItem(NOTIF_STORE_KEY, JSON.stringify(schedules));
  } catch(e) { console.warn('通知スケジュール復元失敗:', e); }
}

// 通知許可バナー表示（一度判断済みなら表示しない）
async function showNotifPermBanner() {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'default') return;
  if (localStorage.getItem('csd_notif_dismissed')) return;
  const banner = document.createElement('div');
  banner.className = 'notif-perm-banner';
  banner.innerHTML = `
    <span style="font-size:18px;">🔔</span>
    <span style="flex:1;color:var(--text2);">デスクトップ通知を有効にするとリマインダーが届きます</span>
    <button id="notif-allow-btn" style="padding:4px 14px;border-radius:99px;border:none;background:var(--accent);color:#fff;font-size:11px;font-family:inherit;cursor:pointer;font-weight:500;">許可する</button>
    <button id="notif-deny-btn" style="padding:4px 10px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;font-family:inherit;cursor:pointer;">今後表示しない</button>`;
  document.body.appendChild(banner);
  banner.querySelector('#notif-allow-btn').addEventListener('click', async () => {
    await requestNotifPermission();
    localStorage.setItem('csd_notif_dismissed', '1');
    banner.remove();
  });
  banner.querySelector('#notif-deny-btn').addEventListener('click', () => {
    localStorage.setItem('csd_notif_dismissed', '1');
    banner.remove();
  });
  setTimeout(() => { if (banner.parentNode) banner.remove(); }, 10000);
}

function pmRenderFilter() {

function pmRenderTable() {
  const tb = document.getElementById('pm-tbody');
  tb.innerHTML = '';
  const prioCol = {high:'#ef4444',mid:'#f59e0b',low:'#6b7280'};
  const stBg = {active:'rgba(26,95,170,0.3)',waiting:'rgba(138,98,0,0.3)',done:'rgba(46,125,50,0.3)',pending:'rgba(255,255,255,0.06)'};
  const stTx = {active:'#7ab3ff',waiting:'#ffd066',done:'#81c784',pending:'var(--text2)'};
  const MONTH_L = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  // 期限月でグループ化（nullは「期限なし」）
  const projects = pmFiltered();
  // 期限月でソート
  const sorted = [...projects].sort((a, b) => {
    const da = a.deadline || '9999-99';
    const db = b.deadline || '9999-99';
    return da.localeCompare(db);
  });

  let lastMonth = null;
  sorted.forEach(p => {
    const month = p.deadline ? p.deadline.slice(0, 7) : null; // "2026-03"
    const monthLabel = month ? `${month.slice(0,4)}年 ${MONTH_L[parseInt(month.slice(5,7))-1]}` : '期限未設定';

    if (month !== lastMonth) {
      lastMonth = month;
      const sep = document.createElement('tr');
      sep.innerHTML = `<td colspan="7" style="padding:8px 8px 4px;background:var(--bg3);border-bottom:0.5px solid var(--border);border-top:${tb.children.length>0?'0.5px solid var(--border)':'none'};"><span style="font-size:10px;font-weight:500;color:var(--accent2);letter-spacing:0.05em;">── ${monthLabel}</span></td>`;
      tb.appendChild(sep);
    }

    const tr = document.createElement('tr');
    // 完了済み＋期限切れはグレーアウト
    const isDoneOverdue = p.status === 'done' && pmDlCls(p.deadline) === 'over';
    tr.style.cssText = `cursor:pointer;transition:background 0.1s;${isDoneOverdue ? 'opacity:0.38;filter:saturate(0.2);' : ''}`;
    if (pmSelId === p.id) tr.style.background = 'rgba(108,99,255,0.1)';
    tr.onmouseover = () => { if (pmSelId !== p.id) tr.style.background = 'rgba(255,255,255,0.03)'; };
    tr.onmouseout = () => { if (pmSelId !== p.id) tr.style.background = ''; };
    const mDots = p.members.map(k => {
      const m = memberMap[k]; if (!m) return '';
      return `<div style="width:18px;height:18px;border-radius:50%;background:${m.color};font-size:8px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:500;margin-right:2px;" title="${m.name}">${m.name[0]}</div>`;
    }).join('');
    const gl = p.gcalLinks && p.gcalLinks[0];
    const gcalDateStr = gl && gl.date ? `<span style="font-size:9px;color:var(--text3);margin-left:3px;">${gl.date.replace('2026-','')}</span>` : '';
    const gcalHtml = gl ? `<a href="${escHtml(gl.url)}" target="_blank" style="font-size:10px;color:#60a5fa;text-decoration:none;" title="${escHtml(gl.title)}">📅 ${escHtml(gl.title)}</a>${gcalDateStr}` : `<span style="font-size:10px;color:var(--text3)">―</span>`;
    const dlCls = pmDlCls(p.deadline);
    tr.innerHTML = `
      <td style="padding:7px 8px;border-bottom:0.5px solid var(--border);"><span style="width:7px;height:7px;border-radius:50%;display:inline-block;background:${prioCol[p.priority]||'#888'}"></span></td>
      <td style="padding:7px 8px;border-bottom:0.5px solid var(--border);"><div style="font-weight:500;font-size:12px;">${escHtml(p.name)}</div><div style="font-size:11px;color:var(--text2)">${escHtml(p.client)}</div></td>
      <td style="padding:7px 8px;border-bottom:0.5px solid var(--border);"><span style="font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;background:${stBg[p.status]||''};color:${stTx[p.status]||''}">${PM_STATUS_L[p.status]||p.status}</span></td>
      <td style="padding:7px 8px;border-bottom:0.5px solid var(--border);"><div style="display:flex;gap:2px;">${mDots}</div></td>
      <td style="padding:7px 8px;border-bottom:0.5px solid var(--border);min-width:90px;"><div style="display:flex;align-items:center;gap:6px;"><div style="flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.08);overflow:hidden;"><div style="height:100%;border-radius:2px;background:#6c63ff;width:${p.progress}%"></div></div><span style="font-size:10px;color:var(--text3)">${p.progress}%</span></div></td>
      <td style="padding:7px 8px;border-bottom:0.5px solid var(--border);"><span style="font-size:11px;${dlCls==='over'?'color:#f87171;font-weight:500':dlCls==='near'?'color:#fbbf24;font-weight:500':'color:var(--text2)'}">${pmDlLbl(p.deadline)}</span></td>
      <td style="padding:7px 8px;border-bottom:0.5px solid var(--border);">${gcalHtml}</td>`;
    tr.addEventListener('click', () => { pmSelId = p.id; pmRenderTable(); pmShowDetail(p); });
    tb.appendChild(tr);
  });
}
function pmShowDetail(p) {

    </div>`).join('');

    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;padding:5px 7px;background:rgba(96,165,250,0.06);border-radius:5px;border:0.5px solid rgba(96,165,250,0.15);">
      <div style="flex:1;min-width:0;">
        <a href="${escHtml(l.url)}" target="_blank" style="font-size:11px;color:#60a5fa;text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">📅 ${escHtml(l.title)}</a>
        ${l.date?`<div style="font-size:10px;color:var(--text3);margin-top:1px;">${l.date.replace('2026-','').replace('-','/')}</div>`:''}
      </div>
    </div>`).join('');
  body.innerHTML = `
    <div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">概要</div>
    <div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;"><span style="color:var(--text2);min-width:56px;font-size:11px;">クライアント</span><span>${escHtml(p.client)}</span></div>
    <div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;"><span style="color:var(--text2);min-width:56px;font-size:11px;">期限</span><span style="${pmDlCls(p.deadline)==='over'?'color:#f87171;font-weight:500':pmDlCls(p.deadline)==='near'?'color:#fbbf24;font-weight:500':''}">${p.deadline}</span></div>
    <div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;"><span style="color:var(--text2);min-width:56px;font-size:11px;">担当</span><div style="display:flex;">${mRow}</div></div>
    <div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;">進捗</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <input type="range" min="0" max="100" step="1" value="${p.progress}" id="pm-prog-sl" style="flex:1;accent-color:#6c63ff;">
      <span id="pm-prog-vl" style="font-size:12px;font-weight:500;min-width:32px;">${p.progress}%</span>
    </div>
    ${gcalHtml ? `<div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;">Googleカレンダー</div>${gcalHtml}` : ''}
    <div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;">タスク <span style="font-weight:400;color:var(--text3)">(${doneT}/${p.tasks.length})</span></div>
    ${taskHtml}
    <div style="display:flex;gap:6px;margin-top:8px;">
      <input id="pm-new-task" placeholder="タスクを追加..." style="flex:1;font-size:11px;padding:4px 8px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg2);color:var(--text);font-family:inherit;">
      <button id="pm-add-task-btn" style="padding:4px 10px;font-size:11px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg2);color:var(--text2);cursor:pointer;font-family:inherit;">追加</button>
    </div>
    <button onclick="pmOpenEditModal('${p.id}')" style="width:100%;padding:7px;font-size:11px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg2);color:var(--text2);cursor:pointer;font-family:inherit;margin-top:6px;">案件を編集</button>`;

  document.getElementById('pm-prog-sl').addEventListener('input', e => {
    p.progress = parseInt(e.target.value);
    document.getElementById('pm-prog-vl').textContent = p.progress + '%';
    pmRenderTable();
  });
  body.querySelectorAll('.pm-task-cb').forEach(cb => {
    cb.addEventListener('click', () => {
      const task = p.tasks.find(t => t.id === cb.dataset.tid);
      if (task) {
        task.done = !task.done;
        const d = p.tasks.filter(t => t.done).length;
        p.progress = Math.round(d / p.tasks.length * 100);
        pmShowDetail(p); pmRenderTable();
      }
    });
  });
  document.getElementById('pm-add-task-btn').addEventListener('click', () => {
    const inp = document.getElementById('pm-new-task');
    const title = inp.value.trim(); if (!title) return;
    p.tasks.push({id:'t'+Date.now(), title, done:false});
    const d = p.tasks.filter(t => t.done).length;
    p.progress = Math.round(d / p.tasks.length * 100);
    inp.value = ''; pmShowDetail(p); pmRenderTable();
  });
}
